# Action Governor — per-platform execution policy
#
# The skill (SKILL.md) expresses INTENT (what to find, score, write).
# This file controls HOW that intent is executed: pacing, stop-conditions,
# and which actions require user confirmation before proceeding.
#
# Fields per platform entry:
#   mode                  — beside_user | ai_driven
#   inter_action_min_ms   — minimum wait between consecutive MCP tool calls (ms)
#   inter_page_min_ms     — minimum wait between page navigations / paginations (ms)
#   autonomous_navigate   — skill may navigate/paginate without asking user (true/false)
#   autonomous_submit     — skill may click send/apply/submit buttons (true/false)
#   stop_on_security_page — halt and alert user if URL matches security_check_pattern (true/false)
#   security_check_patterns — URL substrings that indicate an anti-bot challenge page
#   daily_action_cap      — maximum MCP click/fill/submit actions per session on this platform
#   notes                 — free-text rationale shown in skill retro output

_schema_version: 1

platforms:

  # ── Chinese mainland job boards (beside_user mode) ─────────────────────────

  www.zhipin.com:
    mode: beside_user
    inter_action_min_ms: 3000
    inter_page_min_ms: 6000
    autonomous_navigate: false
    autonomous_submit: false
    stop_on_security_page: true
    security_check_patterns:
      - "/web/passport/zp/verify"
      - "_security_check"
    daily_action_cap: 0
    notes: >
      Safety mode for BOSS anti-bot risk. User manually navigates pages;
      AI only reads snapshot content and never paginates or submits.

  www.liepin.com:
    mode: beside_user
    inter_action_min_ms: 2000
    inter_page_min_ms: 4000
    autonomous_navigate: false
    autonomous_submit: false
    stop_on_security_page: true
    security_check_patterns:
      - "liepin.com/web/login"
      - "security"
    daily_action_cap: 0
    notes: >
      猎聘 web UI is unreliable for programmatic form interaction.
      beside_user is safer and more reliable.

  www.zhaopin.com:
    mode: beside_user
    inter_action_min_ms: 2000
    inter_page_min_ms: 4000
    autonomous_navigate: false
    autonomous_submit: false
    stop_on_security_page: true
    security_check_patterns:
      - "zhaopin.com/login"
      - "verify"
    daily_action_cap: 0
    notes: 智联招聘 — beside_user default.

  www.51job.com:
    mode: beside_user
    inter_action_min_ms: 2000
    inter_page_min_ms: 4000
    autonomous_navigate: false
    autonomous_submit: false
    stop_on_security_page: true
    security_check_patterns:
      - "51job.com/login"
      - "captcha"
    daily_action_cap: 0
    notes: 前程无忧 — beside_user default.

  # ── LinkedIn ───────────────────────────────────────────────────────────────

  www.linkedin.com:
    mode: ai_driven
    inter_action_min_ms: 1200
    inter_page_min_ms: 2000
    autonomous_navigate: true
    autonomous_submit: false      # user always confirms before Apply / Easy Apply submit
    stop_on_security_page: true
    security_check_patterns:
      - "linkedin.com/checkpoint"
      - "linkedin.com/uas/login"
    daily_action_cap: 80
    notes: >
      LinkedIn tolerates reasonable automation. Autonomous navigation and reading
      are fine. Never auto-submit an application — user must confirm each Easy Apply.

  # ── Generic ATS / company careers pages ───────────────────────────────────

  greenhouse.io:
    mode: ai_driven
    inter_action_min_ms: 800
    inter_page_min_ms: 1500
    autonomous_navigate: true
    autonomous_submit: false
    stop_on_security_page: false
    security_check_patterns: []
    daily_action_cap: 50
    notes: Greenhouse ATS — AI fills form, user reviews and submits.

  lever.co:
    mode: ai_driven
    inter_action_min_ms: 800
    inter_page_min_ms: 1500
    autonomous_navigate: true
    autonomous_submit: false
    stop_on_security_page: false
    security_check_patterns: []
    daily_action_cap: 50
    notes: Lever ATS — same as Greenhouse.

  jobs.ashbyhq.com:
    mode: ai_driven
    inter_action_min_ms: 800
    inter_page_min_ms: 1500
    autonomous_navigate: true
    autonomous_submit: false
    stop_on_security_page: false
    security_check_patterns: []
    daily_action_cap: 50
    notes: Ashby ATS.

  # ── Default (unknown / unlisted domains) ──────────────────────────────────

  default:
    mode: ai_driven
    inter_action_min_ms: 1500
    inter_page_min_ms: 3000
    autonomous_navigate: true
    autonomous_submit: false
    stop_on_security_page: true
    security_check_patterns:
      - "captcha"
      - "verify"
      - "security_check"
    daily_action_cap: 40
    notes: >
      Conservative defaults for any unlisted domain. Override here if you add
      a new platform and want looser or tighter controls.

# ── Global overrides ─────────────────────────────────────────────────────────
#
# These apply regardless of platform:

global:
  # Hard cap across all platforms per session
  session_action_cap: 200

  # Always require user confirmation before these action types,
  # regardless of platform mode:
  always_confirm:
    - submit_application
    - send_message
    - upload_resume

  # If a security check is detected, pause all autonomous actions
  # for this many minutes before allowing retry:
  security_check_cooldown_minutes: 30
