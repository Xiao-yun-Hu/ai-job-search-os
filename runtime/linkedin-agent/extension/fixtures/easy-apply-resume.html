<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Easy Apply - Resume</title></head>
<body>
<div role="dialog" class="jobs-easy-apply-content">
  <h3>Resume / CV</h3>
  <div class="jobs-easy-apply-form-section">
    <p>Choose a resume to submit with your application.</p>
    <ul class="jobs-document-upload-redesign-card__list">
      <li class="jobs-document-upload-redesign-card__container" data-test-document-upload-list-item="0">
        <span class="jobs-document-upload-redesign-card__name">Rachel_Hu_Resume_2026.pdf</span>
        <span class="jobs-document-upload-redesign-card__date">Uploaded Jun 1, 2026</span>
        <input type="radio" name="resume" value="resume-1" />
      </li>
      <li class="jobs-document-upload-redesign-card__container" data-test-document-upload-list-item="1">
        <span class="jobs-document-upload-redesign-card__name">Rachel_Hu_Resume_2025.pdf</span>
        <span class="jobs-document-upload-redesign-card__date">Uploaded Jan 15, 2025</span>
        <input type="radio" name="resume" value="resume-2" />
      </li>
    </ul>
  </div>
  <div class="jobs-easy-apply-form-footer">
    <button aria-label="Continue to next step" type="button">Next</button>
  </div>
</div>
</body>
</html>
