<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Easy Apply - Screening Yes/No</title></head>
<body>
<div role="dialog" class="jobs-easy-apply-content">
  <h3>Additional questions</h3>
  <div class="jobs-easy-apply-form-section">
    <fieldset>
      <legend>Are you authorized to work in the United States? *</legend>
      <label><input type="radio" name="work-auth" value="Yes" /> Yes</label>
      <label><input type="radio" name="work-auth" value="No" /> No</label>
    </fieldset>
    <fieldset>
      <legend>Will you now or in the future require sponsorship for employment visa status? *</legend>
      <label><input type="radio" name="sponsorship" value="Yes" /> Yes</label>
      <label><input type="radio" name="sponsorship" value="No" /> No</label>
    </fieldset>
  </div>
  <div class="jobs-easy-apply-form-footer">
    <button aria-label="Continue to next step" type="button">Next</button>
  </div>
</div>
</body>
</html>
