<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Easy Apply - Contact Info</title></head>
<body>
<div role="dialog" class="jobs-easy-apply-content">
  <h3>Contact info</h3>
  <div class="jobs-easy-apply-form-section">
    <label for="firstName">First Name *</label>
    <input id="firstName" type="text" value="Rachel" required />

    <label for="lastName">Last Name *</label>
    <input id="lastName" type="text" value="Hu" required />

    <label for="email">Email Address *</label>
    <input id="email" type="email" value="test@example.com" required />

    <label for="phone">Phone Number *</label>
    <input id="phone" type="tel" value="+1-555-0100" required />
  </div>
  <div class="jobs-easy-apply-form-footer">
    <button aria-label="Continue to next step" type="button">Next</button>
  </div>
</div>
</body>
</html>
