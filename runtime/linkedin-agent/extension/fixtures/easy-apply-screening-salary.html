<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Easy Apply - Screening Salary</title></head>
<body>
<div role="dialog" class="jobs-easy-apply-content">
  <h3>Additional questions</h3>
  <div class="jobs-easy-apply-form-section">
    <label for="desired-salary">What is your desired salary (USD/year)? *</label>
    <input id="desired-salary" type="number" placeholder="e.g. 150000" data-field-type="salary" required />
    <small>Please enter your expected annual compensation.</small>

    <label for="current-comp">Current total compensation (USD/year) *</label>
    <input id="current-comp" type="number" placeholder="e.g. 130000" data-field-type="compensation" required />
  </div>
  <div class="jobs-easy-apply-form-footer">
    <button aria-label="Continue to next step" type="button">Next</button>
  </div>
</div>
</body>
</html>
